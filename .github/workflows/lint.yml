name: Enterprise Quality & CI 2026

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Pint
        run: vendor/bin/pint

      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint

      - name: Type Check
        run: npm run types

      - name: Verify Production Frontend Build
        run: npm run build:frontend

      - name: "🚀 Commit & Push Auto-fixes"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format style [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
