name: Enterprise Quality & CI 2026

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, gd, intl, bcmath, pdo_sqlite, sqlite3, pdo_pgsql, pgsql

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Pint
        run: vendor/bin/pint

      - name: Check Frontend Format
        run: npm run format:check

      - name: Lint Frontend
        run: npm run lint

      - name: Type Check
        run: npm run types

      - name: Verify Production Frontend Build
        run: npm run build:frontend
