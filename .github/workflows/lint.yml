name: Lint

on:
  push:
    # Run on every push (all branches) to catch issues early.
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repository standard
        run: |
          chmod +x scripts/verify-repo-standard.sh
          ./scripts/verify-repo-standard.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, curl, zip, gd, intl, bcmath, pdo_sqlite, sqlite3, pdo_pgsql, pgsql

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Pint
        run: vendor/bin/pint

      - name: Run PHPStan (Larastan)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Check Frontend Format
        run: npm run format:check

      - name: Guardrail: no unsafe HTML rendering
        run: npm run check:no-unsafe-html

      - name: Lint Frontend
        run: npm run lint

      - name: Type Check
        run: npm run types

      - name: Verify Production Frontend Build
        run: npm run build:frontend
