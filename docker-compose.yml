services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    command:
      - /bin/sh
      - -lc
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;

          root /var/www/html/public;
          index index.php;

          # Security headers are set by the app middleware; keep nginx minimal.
          client_max_body_size 20m;

          location / {
            try_files $uri $uri/ /index.php?$query_string;
          }

          location ~ \.php$ {
            try_files $uri =404;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_pass app:9000;
          }

          location ~* \.(?:css|js|map|jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri =404;
          }
        }
        EOF
        nginx -g 'daemon off;'
    volumes:
      - ./:/var/www/html:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Reasonable defaults for docker-compose; override via .env
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: "5432"
      DB_CONNECTION: pgsql
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-c41}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: c41
      DB_USERNAME: c41
      DB_PASSWORD: c41
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: c41
      MYSQL_USER: c41
      MYSQL_PASSWORD: c41
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data:

